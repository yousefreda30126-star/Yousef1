name: 🚀 Deploy YOUSF1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────
#  JOB 1: Deploy Frontend → GitHub Pages
# ─────────────────────────────────────────────────────────
jobs:
  deploy-frontend:
    name: 🌐 Frontend → GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build React app
        working-directory: ./frontend
        env:
          REACT_APP_API_URL:  ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_WS_URL:   ${{ secrets.REACT_APP_WS_URL }}
          CI: false
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./frontend/build
          cname: ""   # ← أضف domain مخصص هنا إن أردت

# ─────────────────────────────────────────────────────────
#  JOB 2: Trigger Render Re-deploy (Backend)
# ─────────────────────────────────────────────────────────
  deploy-backend:
    name: ⚡ Backend → Render
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Trigger Render Deploy Hook
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        # أضف RENDER_DEPLOY_HOOK في GitHub Secrets
        # تجده في: Render Dashboard → Service → Settings → Deploy Hook
